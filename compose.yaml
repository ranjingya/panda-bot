x-bot-service: &bot-service
  build:
    context: .
  image: panda-bot:local
  env_file:
    - .env
  environment:
    PANDA_DATABASE_PATH: /app/data/panda.db
    PANDA_RULES_PATH: /app/config/rules.yaml
    PANDA_MESSAGES_PATH: /app/config/messages.yaml
  volumes:
    - ./data:/app/data
  restart: unless-stopped
  stop_grace_period: 20s

services:
  shadow:
    <<: *bot-service
    profiles:
      - shadow
    command:
      - shadow

  live:
    <<: *bot-service
    profiles:
      - live
    command:
      - live

  shadow-export:
    build:
      context: .
    image: panda-bot:local
    profiles:
      - tools
    env_file:
      - .env
    environment:
      PANDA_DATABASE_PATH: /app/data/panda.db
      PANDA_RULES_PATH: /app/config/rules.yaml
      PANDA_MESSAGES_PATH: /app/config/messages.yaml
    volumes:
      - ./data:/app/data
    entrypoint:
      - ./.venv/bin/panda-shadow-export
    command:
      - --days
      - "5"
      - --output
      - /app/data/shadow-review.md
