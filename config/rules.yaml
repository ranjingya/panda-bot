version: "1"

schedule:
  timezone: Asia/Shanghai
  morning_start: "08:35"
  morning_end: "11:30"
  afternoon_start: "12:45"
  earliest_send: "14:30"
  hard_stop: "17:30"

activity:
  min_afternoon_turns: 12
  min_afternoon_senders: 2
  burst_merge_seconds: 60

context:
  lookback_minutes: 10
  max_messages: 5
  retention_minutes: 30

shadow_collection:
  enabled: true
  retention_days: 5
  max_text_chars: 2000

energy:
  threshold_min: 45
  threshold_max: 80
  retained_ratio_min: 0.15
  retained_ratio_max: 0.35
  threshold_increment_min: 12
  threshold_increment_max: 25
  decay:
    full_minutes: 30
    partial_minutes: 90
    partial_ratio: 0.8
    long_ratio: 0.5

trigger:
  daily_limit: 4
  cooldown_min_minutes: 30
  cooldown_max_minutes: 45
  risk_silence_minutes: 45
  reply_ratio: 0.4
  probability_bands:
    - overage: 0
      probability: 0.2
    - overage: 10
      probability: 0.35
    - overage: 20
      probability: 0.5
    - overage: 35
      probability: 0.75
  time_fallback:
    enabled: true
    daily_limit: 1
    probability_bands:
      - from_time: "14:30"
        probability: 0.01
      - from_time: "15:30"
        probability: 0.02
      - from_time: "16:30"
        probability: 0.04
      - from_time: "17:00"
        probability: 0.08

classifier:
  signals:
    - name: overall_finish
      patterns:
        - 全部结束
        - 都结束了
        - 全部搞定
        - 全搞定了
        - 今天收尾
        - 收尾完成
        - 使命完成
        - 完美收官
      score_min: 20
      score_max: 30
    - name: delivery
      patterns:
        - 已经发布
        - 发布完成
        - 发布成功
        - 已上线
        - 上线完成
        - 交付完成
        - 已交付
        - 改成待交付
        - 进入待交付
        - 已经发出
      score_min: 18
      score_max: 25
    - name: verified
      patterns:
        - 测试通过
        - 验收完成
        - 验收通过
        - 客户确认
        - 检查通过
        - 跑通了
        - 已经跑通
        - 基本稳定了
        - 稳定运行
      score_min: 15
      score_max: 22
    - name: general_finish
      patterns:
        - 完成了
        - 已完成
        - 搞定了
        - 已搞定
        - 处理好了
        - 已处理好
        - 做完了
        - 写完了
        - 改好了
        - 修完了
        - 修复完成
        - 弄完了
        - 结束了
        - 分好了
        - 设置好了
        - 成了哈哈
        - 终于铺货结束
      score_min: 12
      score_max: 18
  negative_patterns:
    - 还没完成
    - 尚未完成
    - 完成不了
    - 没完成
    - 还没搞定
    - 搞不定
    - 还没做完
    - 没做完
    - 还没写完
    - 没写完
    - 还没改好
    - 没改好
    - 还没跑通
    - 没跑通
    - 还有 bug
    - 还有bug
    - bug 超级多
    - bug超级多
    - 一直报错
    - 又报错了
    - 准备返工
    - 肯定要返工
    - 上线失败
    - 发布失败
    - 交付失败
  risk_patterns:
    - 线上故障
    - 生产故障
    - 数据异常
    - 数据丢失
    - 客户投诉
    - 紧急修复
    - 紧急处理
    - 需要回滚
    - 正在回滚
    - 影响业务
    - 全站不可用
    - 服务不可用
    - 严重事故
  casual_complaints:
    - 烦死了
    - 好烦
    - 服了
    - 难绷
    - 要命
    - 崩溃
    - 受不了了
    - 不想干
    - 救命
  ignored_patterns:
    - 想下班
    - 提前下班
    - 可以下班
    - 下班再
    - 不管了
    - 就这样吧
    - 准备好了

presentation:
  recent_copy_window: 10
  interaction_minutes: 5
